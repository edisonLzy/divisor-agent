packages:
  - "packages/*"
  - "packages/extensions/*"

allowBuilds:
  "@google/genai": false
  electron: true
  electron-winstaller: true
  esbuild: true
  protobufjs: true

catalog:
  # React 核心栈
  react: ^19.2.1
  react-dom: ^19.2.1
  "@types/react": ^19.2.7
  "@types/react-dom": ^19.2.3

  # Agent runtime(版本敏感,minimumReleaseAgeExclude 同步锁)
  "@earendil-works/pi-agent-core": 0.74.0
  "@earendil-works/pi-ai": 0.74.0

  # UI 基础
  "@tiptap/core": ^3.22.5
  lucide-react: ^1.8.0
  streamdown: ^2.5.0
  clsx: ^2.1.1
  "@floating-ui/dom": ^1.7.6

  # 工具链
  typescript: ^6.0.3
  vitest: ^4.0.16

minimumReleaseAgeExclude:
  - "@earendil-works/pi-agent-core@0.74.0"
  - "@earendil-works/pi-ai@0.74.0"
